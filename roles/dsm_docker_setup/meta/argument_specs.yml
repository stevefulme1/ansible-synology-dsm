---
argument_specs:
  main:
    short_description: "Configure Container Manager with containers"
    options:
      dsm_docker_setup_host:
        description: Target host address
        type: str
        required: true
      dsm_docker_setup_username:
        description: Authentication username
        type: str
      dsm_docker_setup_password:
        description: Authentication password
        type: str
        no_log: true
      dsm_docker_setup_api_key:
        description: API key for authentication
        type: str
        no_log: true
      dsm_docker_setup_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      dsm_docker_setup_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
