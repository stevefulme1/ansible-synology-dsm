---
# extensions/audit/event_query.yml
# Maps Synology DSM module return values to the AAP Normalized Resource Taxonomy.
# Return keys match the module's documented return field (e.g. vm, storage_pool).
# Synology API returns "name" in each resource dict; guest_id is used for VMs.

stevefulme1.synology_dsm.dsm_vmm:
  query: >-
    {
      name: .vm.name,
      canonical_facts: {
        uuid: .vm.guest_id
      },
      facts: {
        device_type: "virtual_machine"
      }
    }

stevefulme1.synology_dsm.dsm_storage_pool:
  query: >-
    {
      name: .storage_pool.name,
      canonical_facts: {
        uuid: .storage_pool.name
      },
      facts: {
        device_type: "file_storage"
      }
    }

