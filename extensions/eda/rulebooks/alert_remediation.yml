---
- name: "Synology_Dsm Alert Remediation"
  hosts: all
  sources:
    - stevefulme1.synology_dsm.dsm_webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Critical alert
      condition: event.synology_dsm is defined
      action:
        run_playbook:
          name: remediate.yml
          extra_vars:
            alert: "{{ event.synology_dsm }}"
