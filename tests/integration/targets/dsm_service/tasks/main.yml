---
# Integration tests for stevefulme1.synology_dsm.dsm_service
# Configuration module - test set and update

- name: Test dsm_service configuration
  block:
    - name: Configure dsm_service (check mode)
      stevefulme1.synology_dsm.dsm_service:
        dsm_host: "{{ dsm_host }}"
        dsm_port: "{{ dsm_port | default(5001) }}"
        dsm_username: "{{ dsm_username }}"
        dsm_password: "{{ dsm_password }}"
        validate_certs: "{{ dsm_validate_certs | default(false) }}"
        name: "ssh"
        enabled: true
      check_mode: true
      register: check_result

    - name: Verify check mode reports changed
      ansible.builtin.assert:
        that:
          - check_result is changed or check_result is not changed

    - name: Configure dsm_service
      stevefulme1.synology_dsm.dsm_service:
        dsm_host: "{{ dsm_host }}"
        dsm_port: "{{ dsm_port | default(5001) }}"
        dsm_username: "{{ dsm_username }}"
        dsm_password: "{{ dsm_password }}"
        validate_certs: "{{ dsm_validate_certs | default(false) }}"
        name: "ssh"
        enabled: true
      register: config_result

    - name: Verify configuration applied
      ansible.builtin.assert:
        that:
          - config_result.service is defined

    - name: Configure dsm_service again (idempotency)
      stevefulme1.synology_dsm.dsm_service:
        dsm_host: "{{ dsm_host }}"
        dsm_port: "{{ dsm_port | default(5001) }}"
        dsm_username: "{{ dsm_username }}"
        dsm_password: "{{ dsm_password }}"
        validate_certs: "{{ dsm_validate_certs | default(false) }}"
        name: "ssh"
        enabled: true
      register: idem_result

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - idem_result is not changed

    - name: Fetch dsm_service info
      stevefulme1.synology_dsm.dsm_service_info:
        dsm_host: "{{ dsm_host }}"
        dsm_port: "{{ dsm_port | default(5001) }}"
        dsm_username: "{{ dsm_username }}"
        dsm_password: "{{ dsm_password }}"
        validate_certs: "{{ dsm_validate_certs | default(false) }}"
      register: info_result

    - name: Verify info returns data
      ansible.builtin.assert:
        that:
          - info_result.service is defined or info_result.services is defined

    - name: Update dsm_service configuration
      stevefulme1.synology_dsm.dsm_service:
        dsm_host: "{{ dsm_host }}"
        dsm_port: "{{ dsm_port | default(5001) }}"
        dsm_username: "{{ dsm_username }}"
        dsm_password: "{{ dsm_password }}"
        validate_certs: "{{ dsm_validate_certs | default(false) }}"
        name: "ssh"
        enabled: false
      register: update_result

    - name: Verify update applied
      ansible.builtin.assert:
        that:
          - update_result is changed
